name: base_structure
description: "Base Structure.!!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Network
  dio: ^5.9.1
  pretty_dio_logger: ^1.4.0
  equatable: ^2.0.8
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  # DI
  get_it: ^9.2.0
  # Language
  easy_localization: ^3.0.8
  intl: any
  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  # Routes
  go_router: ^17.0.0
  # Responsive
  flutter_screenutil: ^5.9.3
  # Snack bars
  fluttertoast: ^9.0.0
  # Refresh
  pull_to_refresh: ^2.0.0
  # ui
  transparent_image: ^2.0.1
  flutter_svg: ^2.2.3
  async_button_handler: ^0.1.0+2
  percent_indicator: ^4.2.5
  qr_flutter_new: ^1.0.2
  barcode_widget: ^2.0.4
  dropdown_search: ^6.0.2
  country_code_picker: ^3.4.1
  flutter_spinkit: ^5.2.2
  dotted_border: ^3.1.0
  # picker
  image_picker: ^1.2.1
  file_picker: ^8.0.5
  flutter_image_compress: ^2.4.0
  path:
  path_provider: ^2.1.3
  # maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  location: ^8.0.0
  permission_handler: ^11.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/fonts/
    - assets/svg/
    - assets/images/

  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700